<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIMADLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --accent: #e8ff47;
            --accent-dim: #c8df27;
            --green: #4ade80;
            --yellow: #facc15;
            --gray: #52525b;
            --text: #f5f5f5;
            --text-muted: #71717a;
            --red: #f87171;
            --cell-size: 62px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 40px;
            overflow-x: hidden;
        }

        /* ---- HEADER ---- */
        header {
            width: 100%;
            max-width: 720px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
