<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIMADLE</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --accent: #e8ff47;
            --accent-dim: #c8df27;
            --green: #4ade80;
            --yellow: #facc15;
            --gray: #52525b;
            --text: #f5f5f5;
            --text-muted: #71717a;
            --red: #f87171;
            --cell-size: 62px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 40px;
            overflow-x: hidden;
        }

        /* ---- HEADER ---- */
        header {
            width: 100%;
            max-width: 720px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 4px;
            color: var(--accent);
            line-height: 1;
            text-align: center;
        }

        .logo span { color: var(--text); }

        .header-right {
            display: flex;
            justify-content: flex-end;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ---- BASE WORD ---- */
        .word-prompt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
        }

        .prompt-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
        }

        .base-word {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 8px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 36px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .base-word::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 60%, rgba(232,255,71,0.06));
            pointer-events: none;
        }

        .rhyme-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .rhyme-hint strong { color: var(--accent); }

        /* ---- BOARD ---- */
        .board-area {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .attempt-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 66px;
        }

        .attempt-row .cells {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.7rem;
            letter-spacing: 1px;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.15s, transform 0.15s ease-out;
            flex-shrink: 0;
        }

        .cell.active-border { border-color: #555; }

        .cell.pop {
            animation: pop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop {
            0%   { transform: scale(1); }
            60%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @keyframes revealIn {
            0%   { transform: scale(0.85); opacity: 0.2; }
            60%  { transform: scale(1.06); opacity: 1; }
            100% { transform: scale(1);    opacity: 1; }
        }

        .cell.reveal {
            animation: revealIn 0.38s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
        }

        .cell.green  { background: var(--green);  border-color: var(--green);  color: #0f0f0f; }
        .cell.yellow { background: var(--yellow); border-color: var(--yellow); color: #0f0f0f; }
        .cell.gray   { background: var(--gray);   border-color: var(--gray);   color: var(--text); }

        .row-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: var(--accent);
            white-space: nowrap;
            min-width: 60px;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .row-score.visible { opacity: 1; }

        /* Active input row */
        .active-row .cells .cell {
            border-color: #3a3a3a;
        }

        /* ---- LOADING / BREATHING ---- */
        .checking-badge {
            display: none;
            align-items: center;
            justify-content: center;
        }

        .checking-badge.visible { display: flex; }

        .breathing-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 6px;
            color: var(--text-muted);
            animation: breathe 2s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes breathe {
            0%   { opacity: 0.3; transform: scale(0.97); letter-spacing: 5px; }
            50%  { opacity: 1;   transform: scale(1.04); letter-spacing: 8px; }
            100% { opacity: 0.3; transform: scale(0.97); letter-spacing: 5px; }
        }

        /* ---- MESSAGE ---- */
        .message-area {
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .message {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 20px;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.25s, transform 0.25s;
            text-align: center;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message.success { border-color: var(--green); color: var(--green); }
        .message.error   { border-color: var(--red);   color: var(--red);   }
        .message.warn    { border-color: var(--yellow); color: var(--yellow); }

        /* ---- KEYBOARD ---- */
        .keyboard {
            width: 100%;
            max-width: 620px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .key {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            height: 54px;
            min-width: 40px;
            padding: 0 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.08s;
            text-transform: uppercase;
            flex: 1;
            max-width: 52px;
            user-select: none;
        }

        .key:active { transform: scale(0.92); }

        .key.wide {
            min-width: 64px;
            max-width: 72px;
            font-size: 0.8rem;
            background: #2c2c2c;
        }



        .key.enter-key {
            background: var(--accent);
            color: #0f0f0f;
            font-weight: 800;
        }

        .key.enter-key:hover { background: var(--accent-dim); }

        .key.k-green  { background: var(--green);  border-color: var(--green);  color: #0f0f0f; }
        .key.k-yellow { background: var(--yellow); border-color: var(--yellow); color: #0f0f0f; }
        .key.k-gray   { background: var(--gray);   border-color: var(--gray); }

        /* ---- NEW GAME BTN ---- */
        .bottom-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .new-game-btn {
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .new-game-btn:hover  { background: var(--accent-dim); }
        .new-game-btn:active { transform: scale(0.96); }

        /* ---- END OVERLAY ---- */
        .end-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .end-panel.visible { display: flex; }

        .end-emoji { font-size: 3rem; }

        .end-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            color: var(--accent);
        }

        .end-sub { font-size: 0.9rem; color: var(--text-muted); }

        .end-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: var(--text);
        }

        .end-score span { color: var(--accent); }

        .end-rhyme-detail {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .end-rhyme-type {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            padding: 4px 18px;
            border-radius: 20px;
            border: 2px solid;
        }

        .end-rhyme-type.consonante {
            color: var(--green);
            border-color: var(--green);
        }

        .end-rhyme-type.asonante {
            color: var(--yellow);
            border-color: var(--yellow);
        }

        .end-rhyme-what {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .end-rhyme-what strong {
            color: var(--text);
        }

        /* ---- MODE SELECTOR ---- */
        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            padding: 7px 18px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .mode-btn:hover { border-color: #555; color: var(--text); }

        .mode-btn.active {
            color: #0f0f0f;
            border-color: transparent;
        }

        .mode-btn[data-mode="facil"].active    { background: #4ade80; }
        .mode-btn[data-mode="medio"].active    { background: #facc15; }
        .mode-btn[data-mode="dificil"].active  { background: #fb923c; }
        .mode-btn[data-mode="imposible"].active { background: #f87171; }

        .mode-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            padding: 2px 10px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .mode-badge.facil     { background: #4ade8022; color: #4ade80; }
        .mode-badge.medio     { background: #facc1522; color: #facc15; }
        .mode-badge.dificil   { background: #fb923c22; color: #fb923c; }
        .mode-badge.imposible { background: #f8717122; color: #f87171; }

        @media (max-width: 560px) {
            :root { --cell-size: 48px; }
            .logo { font-size: 2rem; }
            .base-word { font-size: 2.5rem; letter-spacing: 4px; padding: 8px 24px; }
            .cell { font-size: 1.3rem; }
            .key { height: 46px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span class="mode-badge facil" id="modeBadge">FÁCIL</span>
    </div>
    <div class="logo">RIMA<span>DLE</span></div>
    <div class="header-right">
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-val" id="totalScore">0</div>
                <div class="stat-label">Puntos</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="gamesWon">0</div>
                <div class="stat-label">Ganadas</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="streak">0</div>
                <div class="stat-label">Racha</div>
            </div>
        </div>
    </div>
</header>

<div class="mode-selector">
    <button class="mode-btn active" data-mode="facil">Fácil</button>
    <button class="mode-btn" data-mode="medio">Medio</button>
    <button class="mode-btn" data-mode="dificil">Difícil</button>
    <button class="mode-btn" data-mode="imposible">Imposible</button>
</div>

<div class="word-prompt">
    <div class="prompt-label">encuentra palabras que rimen con</div>
    <div class="base-word" id="baseWordDisplay">—</div>
    <div class="rhyme-hint" id="rhymeHint"></div>
</div>

<div class="board-area" id="boardArea"></div>

<div class="checking-badge" id="checkingBadge">
    <span class="breathing-text" id="checkingText">CONSULTANDO</span>
</div>

<div class="message-area">
    <div class="message" id="message"></div>
</div>

<div class="end-panel" id="endPanel">
    <div class="end-title" id="endTitle">¡GANASTE!</div>
    <div class="end-sub" id="endSub">Encontraste la rima</div>
    <div class="end-rhyme-detail" id="endRhymeDetail"></div>
    <div class="end-score">+<span id="endPoints">0</span> pts</div>
</div>

<div class="keyboard" id="keyboard"></div>

<div class="bottom-bar">
    <button class="new-game-btn" id="newGameBtn">Nueva palabra</button>
</div>

<script>
(function () {

// ──────────────────────────────────────────────
// MODES CONFIG
// ESTO GENERARIA LA PALBRA PERO YA NO SE UTILIZA Y SE HA IMPLEMENTADO UN DICCIONARIO
// ──────────────────────────────────────────────
const MODES = {

        "MELANCÓLICO","FANTASMAL","CELESTIAL","MONUMENTAL","SENSACIONAL",
        "EXCEPCIONAL","EMOCIONAL","RACIONAL","ACIONAL","VOCACIONAL",
        "PROFESIONAL","PERSONAL","UNIVERSAL","GENERAL","MINERAL",

    ],
    imposible: [
        // 12-16 letras
        "PROCRASTINACION","CONDESCENDIENTE","INCOMPRENSIBLE","EXTRAORDINARIO",
        "MAGNANIMIDAD","EXCOMUNICACION","TRANSCENDENTAL","SUPERSTICION",

        "DESESTABILIZADOR","INTERMINABLEMENTE","PREPONDERANCIA","MAGNIFICENCIA",
        "OMNIPRESENTE","EXTRAVAGANCIA","PERPLEJIDADES","REMINISCENCIA",
        "CONDESCENDENCIA","PREPOTENCIA","INADMISIBLE","INCONTROVERTIBLE",
        "ELECTROENCEFALOGRAMA","ANTICONSTITUCIONAL","DESCLASIFICACION",
        "DESCENTRALIZACION","INTERNACIONALIZACION","DEMOCRATIZACION",
        "INDUSTRIALIZACION","DESINDUSTRIALIZACION","PROFESIONALIZACION",
        "INTERNACIONALIZACION","CONTRAMANIFESTACION","ANTIINFLAMATORIO",
        "ELECTROMAGNETISMO","RADIOACTIVIDAD","TERMODINÁMICA","HIDRODINAMICA",
        "FOTOSINTESIS","BIODIVERSIDAD","SOSTENIBILIDAD","VULNERABILIDAD",
        "RESPONSABILIDAD","DISPONIBILIDAD","ACCESIBILIDAD","COMPATIBILIDAD",
        "INESTABILIDAD","IMPOSIBILIDAD","INCAPACIDAD","IRREGULARIDAD",
        "IRRACIONALIDAD","INFORMALIDAD","HORIZONTALIDAD","VERTICALIDAD",
        "OMNIPOTENCIA","OMNISCIENCIA","TRANSPARENCIA","CONSECUENCIA",
        "INDEPENDENCIA","INTERDEPENDENCIA","CORRESPONDENCIA","INCOHERENCIA",
        "INCONTESTABLEMENTE","INDISCRIMINADAMENTE","INCONVENIENTEMENTE",
        "INCONSTITUCIONALMENTE","ININTERRUMPIDAMENTE","INCOMPRENSIBLEMENTE",
        "IRREMEDIABLEMENTE","IRRESPONSABLEMENTE","IRREVERSIBLEMENTE",
        "DESAFORTUNADAMENTE","DESPROPORCIONADAMENTE","DESFAVORABLEMENTE",
        "SUPERFICIALIDAD","ESPIRITUALIDAD","TERRITORIALIDAD","PUNTUALIDAD",
        "SENSACIONALISMO","PROFESIONALISMO","MATERIALISMO","IDEALISMO",
        "EXISTENCIALISMO","FUNDAMENTALISMO","TOTALITARISMO","AUTORITARISMO"
    ]
};

function generateBaseWord() {
    const list = WORD_LISTS[currentMode] || WORD_LISTS.facil;
    const available = list.filter(w => !USED_WORDS.has(w));
    const pool = available.length > 0 ? available : list;
    const word = pool[Math.floor(Math.random() * pool.length)];
    return word.replace(/Á/g,'A').replace(/É/g,'E').replace(/Í/g,'I')
               .replace(/Ó/g,'O').replace(/Ú/g,'U').replace(/Ü/g,'U');
}

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let currentBaseWord = "";
let attempts = [];        // { word, result:'green'|'yellow'|'gray', points, explanation }
let currentRow = 0;
let currentInput = "";
let gameFinished = false;
let isChecking = false;
const MAX_ATTEMPTS = 6;

let totalScore = 0;
let gamesWon = 0;
let streak = 0;
let roundPoints = 0;

// ──────────────────────────────────────────────
// RHYME UTILS (fast local pre-check)
// ──────────────────────────────────────────────
function normalize(w) {
    return w.toUpperCase()
        .replace(/Á/g,'A').replace(/É/g,'E').replace(/Í/g,'I')
        .replace(/Ó/g,'O').replace(/Ú/g,'U').replace(/Ü/g,'U');
}

function getRhymeEnding(word) {
    const w = normalize(word);
    const vowelMatch = [...w].reduceRight((acc, ch, i) => {
        if (acc !== -1) return acc;
        return /[AEIOU]/.test(ch) ? i : -1;
    }, -1);
    if (vowelMatch === -1) return w;
    return w.slice(vowelMatch);
}

function quickRhymeCheck(guess, base) {
    const ge = getRhymeEnding(guess);
    const be = getRhymeEnding(base);
    if (ge === be) return 'likely_green';
    const g2 = normalize(guess).slice(-2);
    const b2 = normalize(base).slice(-2);
    if (g2 === b2) return 'likely_yellow';
    return 'unsure';
}

// ──────────────────────────────────────────────
// CLAUDE API
// ──────────────────────────────────────────────
async function askClaude(guess, base) {
    const response = await fetch('/api/rhyme', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guess, base })
    });
    if (!response.ok) throw new Error('API error ' + response.status);
    return await response.json();
}

// ──────────────────────────────────────────────
// SCORING
// ──────────────────────────────────────────────
function calcPoints(word, rhymeType, complexity, attemptNum) {
    if (rhymeType === 'ninguna') return 0;
    let pts = 0;
    // Longitud exponencial: cortas puntuan poco, largas puntuan mucho
    const lenPts = Math.round(Math.pow(word.length, 2.2) * 0.5);
    pts += lenPts;
    // Tipo de rima
    if (rhymeType === 'consonante') pts += 20;
    else if (rhymeType === 'asonante') pts += 10;
    // Complejidad IA (1-10)
    pts += complexity * 5;
    // Bonus por intentarlo pronto
    const attemptBonus = [30, 22, 15, 10, 5, 0];
    pts += attemptBonus[attemptNum] || 0;
    // Multiplicador de dificultad
    const multiplier = MODES[currentMode].scoreMultiplier;
    pts = Math.round(pts * multiplier);
    return pts;
}

// ──────────────────────────────────────────────
// DOM BUILDERS
// ──────────────────────────────────────────────
function buildBoard() {
    const area = document.getElementById('boardArea');
    area.innerHTML = '';
    for (let r = 0; r < MAX_ATTEMPTS; r++) {
        const row = document.createElement('div');
        row.className = 'attempt-row' + (r === 0 ? ' active-row' : '');
        row.id = 'row-' + r;

        const cells = document.createElement('div');
        cells.className = 'cells';
        cells.id = 'cells-' + r;

        // start with 1 empty placeholder cell
        renderCellsForRow(cells, '', false);

        const scoreEl = document.createElement('div');
        scoreEl.className = 'row-score';
        scoreEl.id = 'rowscore-' + r;

        row.appendChild(cells);
        row.appendChild(scoreEl);
        area.appendChild(row);
    }
}

function renderCellsForRow(container, word, locked, colorClass) {
    const len = Math.max(word.length, 1);
    container.innerHTML = '';
    for (let i = 0; i < len; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (locked && colorClass) cell.classList.add(colorClass);
        if (word[i]) {
            cell.textContent = word[i];
            cell.classList.add('filled');
        }
        container.appendChild(cell);
    }
}

function updateActiveRow() {
    if (gameFinished) return;
    const cells = document.getElementById('cells-' + currentRow);
    if (!cells) return;
    renderCellsForRow(cells, currentInput, false);
    // highlight last filled cell
    const allCells = cells.querySelectorAll('.cell');
    allCells.forEach((c, i) => {
        c.classList.remove('active-border');
        if (i === currentInput.length - 1 && currentInput.length > 0) {
            c.classList.add('active-border');
        }
    });
}

function revealRow(rowIndex, word, colorClass, points, explanation) {
    return new Promise(resolve => {
        const cells = document.getElementById('cells-' + rowIndex);
        renderCellsForRow(cells, word, false);
        const allCells = cells.querySelectorAll('.cell');

        if (allCells.length === 0) { resolve(); return; }

        allCells.forEach((cell, i) => {
            setTimeout(() => {
                // Apply color first so it's visible during the reveal animation
                cell.classList.add(colorClass);
                cell.classList.add('reveal');
                // Clean up animation class once done
                cell.addEventListener('animationend', () => {
                    cell.classList.remove('reveal');
                }, { once: true });
                if (i === allCells.length - 1) {
                    setTimeout(() => {
                        if (points > 0) {
                            const scoreEl = document.getElementById('rowscore-' + rowIndex);
                            scoreEl.textContent = '+' + points + ' pts';
                            scoreEl.classList.add('visible');
                        }
                        resolve();
                    }, 420);
                }
            }, i * 100);
        });
    });
}

// ──────────────────────────────────────────────
// KEYBOARD
// ──────────────────────────────────────────────
const KEYBOARD_ROWS = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L','Ñ'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
];

function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    KEYBOARD_ROWS.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'key-row';
        row.forEach(k => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.textContent = k;
            btn.dataset.key = k;
            if (k === 'ENTER' || k === '⌫') btn.classList.add('wide');
            if (k === 'ENTER') btn.classList.add('enter-key');
            if (k === '⌫') btn.classList.add('enter-key');
            btn.addEventListener('click', () => handleKey(k));
            rowEl.appendChild(btn);
        });
        kb.appendChild(rowEl);
    });
}

function updateKeyColor(letter, colorClass) {
    if (colorClass === 'gray') return; // no marcar gris en el teclado
    const map = { green: 'k-green', yellow: 'k-yellow' };
    const priority = ['k-green', 'k-yellow'];
    document.querySelectorAll(".key[data-key=\"" + letter + "\"]").forEach(btn => {
        const newCls = map[colorClass];
        if (!newCls) return;
        const curPriority = priority.findIndex(p => btn.classList.contains(p));
        const newPriority = priority.indexOf(newCls);
        if (curPriority === -1 || newPriority < curPriority) {
            priority.forEach(p => btn.classList.remove(p));
            btn.classList.add(newCls);
        }
    });
}

// ──────────────────────────────────────────────
// MESSAGE
// ──────────────────────────────────────────────
let msgTimer = null;
function showMessage(text, type = '', duration = 2800) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message show' + (type ? ' ' + type : '');
    clearTimeout(msgTimer);
    if (duration > 0) {
        msgTimer = setTimeout(() => {
            el.classList.remove('show');
        }, duration);
    }
}

function clearMessage() {
    const el = document.getElementById('message');
    el.classList.remove('show');
}

// ──────────────────────────────────────────────
// HANDLE INPUT
// ──────────────────────────────────────────────
function handleKey(key) {
    if (gameFinished || isChecking) return;
    key = key.toUpperCase();

    if (key === '⌫' || key === 'BACKSPACE') {
        if (currentInput.length > 0) {
            currentInput = currentInput.slice(0, -1);
            updateActiveRow();
            clearMessage();
        }
        return;
    }

    if (key === 'ENTER') {
        submitGuess();
        return;
    }

    if (/^[A-ZÑ]$/.test(key)) {
        if (currentInput.length < 20) {
            currentInput += key;
            updateActiveRow();
            // pop animation on last cell
            const cells = document.getElementById('cells-' + currentRow);
            if (cells) {
                const last = cells.lastElementChild;
                if (last) {
                    last.classList.remove('pop');
                    // small delay lets the browser commit the removal before re-adding
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => last.classList.add('pop'));
                    });
                }
            }
        }
    }
}

window.addEventListener('keydown', e => {
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    if (e.key === 'Enter') { e.preventDefault(); handleKey('ENTER'); }
    else if (e.key === 'Backspace') { e.preventDefault(); handleKey('⌫'); }
    else if (/^[a-zA-ZñÑáéíóúÁÉÍÓÚüÜ]$/.test(e.key)) {
        e.preventDefault();
        // normalize accents
        const map = {'á':'a','é':'e','í':'i','ó':'o','ú':'u','ü':'u','Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','Ü':'U'};
        handleKey(map[e.key] || e.key);
    }
});

// ──────────────────────────────────────────────
// SUBMIT
// ──────────────────────────────────────────────
async function submitGuess() {
    if (gameFinished || isChecking) return;
    const guess = currentInput.trim();

    if (guess.length < 2) {
        showMessage('✏️ Escribe al menos 2 letras', 'warn');
        return;
    }

    if (attempts.some(a => a.word === guess)) {
        showMessage('⏳ Ya usaste esa palabra', 'warn');
        return;
    }

    if (guess === currentBaseWord) {
        showMessage('⚠️ Esa es la palabra base, ¡busca una que rime!', 'warn');
        return;
    }

    // Fast local pre-check
    const quick = quickRhymeCheck(guess, currentBaseWord);

    // Show checking badge
    isChecking = true;
    const badge = document.getElementById('checkingBadge');
    badge.classList.add('visible');
    

    let result;
    try {
        result = await Promise.race([
            askClaude(guess, currentBaseWord),
            new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
        ]);
    } catch (err) {
        console.warn('askClaude failed, using local fallback:', err.message);
        result = {
            es_palabra_real: true,
            tipo_rima: quick === 'likely_green' ? 'consonante' : 'ninguna',
            complejidad: Math.min(10, Math.max(1, Math.floor(guess.length / 1.5))),
            explicacion: 'Sin conexión — intenta de nuevo'
        };
    } finally {
        badge.classList.remove('visible');
        isChecking = false;
    }

    if (!result.es_palabra_real) {
        showMessage('❌ No es una palabra válida en español', 'error');
        return;
    }

    const colorMap = { consonante: 'green', asonante: 'yellow', ninguna: 'gray' };
    const color = colorMap[result.tipo_rima] || 'gray';
    const pts = calcPoints(guess, result.tipo_rima, result.complejidad, currentRow);

    await revealRow(currentRow, guess, color, pts, result.explicacion);

    // Update keyboard
    for (const letter of guess) {
        updateKeyColor(letter, color);
    }

    attempts.push({ word: guess, color, pts });

    if (color !== 'gray') {
        roundPoints += pts;
    }

    // Next row active
    document.getElementById('row-' + currentRow)?.classList.remove('active-row');

    if (color === 'green') {
        // WIN — pts already added to roundPoints above (color !== 'gray')
        totalScore += roundPoints;
        gamesWon++;
        streak++;
        currentInput = '';
        updateStatsUI();
        showMessage('🎉 ¡Rima perfecta! +' + roundPoints + ' pts', 'success', 0);
        showEndPanel(true, roundPoints, result);
        gameFinished = true;
    } else {
        currentRow++;
        currentInput = '';
        if (currentRow >= MAX_ATTEMPTS) {
            // LOSE
            streak = 0;
            updateStatsUI();
            showMessage("😞 Se acabaron los intentos. La base era \"" + currentBaseWord + "\"", 'error', 0);
            showEndPanel(false, roundPoints);
            gameFinished = true;
        } else {
            document.getElementById('row-' + currentRow)?.classList.add('active-row');
            updateActiveRow();
            if (color === 'yellow') {
                showMessage('🟡 Rima asonante — ' + result.explicacion, 'warn', 5000);
            } else {
                showMessage('⬛ No rima — ' + result.explicacion, '', 5000);
            }
        }
    }
}

// ──────────────────────────────────────────────
// END PANEL
// ──────────────────────────────────────────────
function showEndPanel(won, pts, rhymeInfo) {
    const panel = document.getElementById('endPanel');
    document.getElementById('endEmoji').textContent = won ? '🎉' : '😞';
    document.getElementById('endTitle').textContent = won ? '¡GANASTE!' : 'SIN INTENTOS';
    const winWord = attempts[attempts.length-1]?.word || currentInput;
    document.getElementById('endSub').textContent = won
        ? "Rimaste \"" + winWord + "\" con \"" + currentBaseWord + "\""
        : "No encontraste ninguna rima consonante";

    const detailEl = document.getElementById('endRhymeDetail');
    if (won && rhymeInfo) {
        const tipo = rhymeInfo.tipo_rima || 'consonante';
        const patronBase = rhymeInfo.patron_base || '';
        const patronCand = rhymeInfo.patron_candidata || '';
        const tipoLabel = tipo === 'consonante' ? 'RIMA CONSONANTE' : 'RIMA ASONANTE';
        const patronInfo = (patronBase && patronCand)
            ? "<strong>" + patronBase.toUpperCase() + "</strong> · <strong>" + patronCand.toUpperCase() + "</strong>"
            : '';
        detailEl.innerHTML = '<div class="end-rhyme-type ' + tipo + '">' + tipoLabel + '</div>' +
            (patronInfo ? '<div class="end-rhyme-what">Patrón: ' + patronInfo + '</div>' : '');
    } else {
        detailEl.innerHTML = '';
    }

    document.getElementById('endPoints').textContent = pts;
    panel.classList.add('visible');
}

// ──────────────────────────────────────────────
// STATS
// ──────────────────────────────────────────────
function updateStatsUI() {
    document.getElementById('totalScore').textContent = totalScore;
    document.getElementById('gamesWon').textContent = gamesWon;
    document.getElementById('streak').textContent = streak;
}

// ──────────────────────────────────────────────
// NEW GAME
// ──────────────────────────────────────────────
function newGame() {
    // Reset state immediately
    attempts = [];
    currentRow = 0;
    currentInput = '';
    gameFinished = false;
    isChecking = true;
    roundPoints = 0;
    currentBaseWord = '';

    document.getElementById('baseWordDisplay').textContent = '…';
    document.getElementById('rhymeHint').innerHTML = '';
    document.getElementById('endPanel').classList.remove('visible');
    clearMessage();
    buildBoard();
    buildKeyboard();

    // Show loading in badge
    const badge = document.getElementById('checkingBadge');
    
    badge.classList.add('visible');

    currentBaseWord = generateBaseWord();
    USED_WORDS.add(currentBaseWord);

    badge.classList.remove('visible');
    isChecking = false;

    document.getElementById('baseWordDisplay').textContent = currentBaseWord;
    const ending = getRhymeEnding(currentBaseWord);
    document.getElementById('rhymeHint').innerHTML = "Terminación: <strong>…" + ending.toLowerCase() + "</strong>";
}

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
document.getElementById('newGameBtn').addEventListener('click', () => {
    if (isChecking) return;
    newGame();
});

// Mode selector
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if (isChecking) return; // prevent clicking while a word is being generated
        currentMode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cfg = MODES[currentMode];
        const badge = document.getElementById('modeBadge');
        badge.textContent = cfg.label;
        badge.className = 'mode-badge ' + cfg.badgeClass;
        newGame();
    });
});

newGame();

})();
