<!DOCTYPE html>
<html lang="es">
<head>
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIMADLE</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
            --border: #2e2e2e; --accent: #e8ff47; --purple: #a78bfa;
            --text: #f5f5f5; --text-muted: #71717a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px 48px; }

        .logo-wrap { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 48px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 8px; color: var(--accent); line-height: 1; }
        .logo span { color: var(--text); }
        .tagline { font-size: 0.7rem; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; }

        .modes { display: flex; gap: 16px; width: 100%; max-width: 540px; }

        .mode-card {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            transition: border-color 0.2s, transform 0.15s;
        }
        .mode-card:hover { transform: translateY(-2px); }
        .mode-card.clasico { border-top: 3px solid var(--accent); }
        .mode-card.clasico:hover { border-color: var(--accent); border-top-color: var(--accent); }
        .mode-card.estrofa { border-top: 3px solid var(--purple); }
        .mode-card.estrofa:hover { border-color: var(--purple); border-top-color: var(--purple); }

        .mode-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .mode-icon.y { background: #e8ff4718; }
        .mode-icon.p { background: #a78bfa18; }

        .mode-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 4px; }
        .clasico .mode-name { color: var(--accent); }
        .estrofa .mode-name { color: var(--purple); }

        .mode-desc { font-size: 0.78rem; color: var(--text-muted); text-align: center; line-height: 1.6; }

        .mode-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .tag { font-size: 0.62rem; padding: 3px 10px; border-radius: 10px; letter-spacing: 1px; }
        .tag-y { background: #e8ff4712; color: var(--accent); border: 1px solid #e8ff4728; }
        .tag-p { background: #a78bfa12; color: var(--purple); border: 1px solid #a78bfa28; }
        .tag-g { background: #71717a12; color: var(--text-muted); border: 1px solid #71717a28; }

        .mode-btn { width: 100%; padding: 10px; border-radius: 30px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; cursor: pointer; transition: opacity 0.15s; }
        .clasico .mode-btn { background: var(--accent); color: #0f0f0f; }
        .estrofa .mode-btn { background: var(--purple); color: #0f0f0f; }
        .mode-btn:hover { opacity: 0.85; }

        @media (max-width: 480px) {
            .modes { flex-direction: column; }
            .logo { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="logo-wrap">
        <div class="logo">RIMA<span>DLE</span></div>
        <div class="tagline">El juego de las rimas</div>
    </div>

    <div class="modes">
        <a class="mode-card clasico" href="/clasico">
            <div class="mode-icon y">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="5" width="18" height="3" rx="1.5" fill="#e8ff47"/>
                    <rect x="3" y="11" width="12" height="3" rx="1.5" fill="#e8ff47" opacity="0.6"/>
                    <rect x="3" y="17" width="15" height="3" rx="1.5" fill="#e8ff47" opacity="0.3"/>
                </svg>
            </div>
            <div class="mode-name">CLÁSICO</div>
            <div class="mode-desc">Encuentra palabras que rimen con la palabra base. Consonante, asonante o ninguna.</div>
            <div class="mode-tags">
                <span class="tag tag-y">Palabras</span>
                <span class="tag tag-g">4 dificultades</span>
                <span class="tag tag-y">Contrarreloj</span>
            </div>
            <button class="mode-btn">Jugar</button>
        </a>

        <a class="mode-card estrofa" href="/estrofa">
            <div class="mode-icon p">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M6 4 C8 6 12 4 16 5 C18 6 18 9 17 12 C15 17 10 20 6 20" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    <path d="M10 10 L15 10 M10 14 L13 14" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
                </svg>
            </div>
            <div class="mode-name">ESTROFA</div>
            <div class="mode-desc">Te damos un verso. Completa la estrofa y recibe una valoración poética.</div>
            <div class="mode-tags">
                <span class="tag tag-p">Versos libres</span>
                <span class="tag tag-p">Valoración</span>
                <span class="tag tag-g">Sin tiempo</span>
            </div>
            <button class="mode-btn">Componer</button>
        </a>
    </div>

</body>
</html>
