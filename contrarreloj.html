<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIMADLE — Contrarreloj</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --accent: #e8ff47;
            --accent-dim: #c8df27;
            --green: #4ade80;
            --yellow: #facc15;
            --gray: #52525b;
            --red: #f87171;
            --orange: #fb923c;
            --text: #f5f5f5;
            --text-muted: #71717a;
            --cell-size: 58px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 40px;
            overflow-x: hidden;
        }

        /* ---- HEADER ---- */
        header {
            width: 100%;
            max-width: 720px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 4px;
            color: var(--accent);
            line-height: 1;
            text-align: center;
        }

        .logo span { color: var(--text); }

        .header-left { display: flex; align-items: center; }
        .header-right { display: flex; justify-content: flex-end; }

        /* Mode switcher button */
        .mode-switch {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-switch:hover { border-color: var(--orange); color: var(--orange); }
        .mode-switch .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--orange);
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ---- SETUP SCREEN ---- */
        .setup-screen {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding-top: 10px;
        }

        .setup-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 4px;
            color: var(--text-muted);
            text-align: center;
        }

        .setup-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .setup-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
        }

        .option-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .option-btn {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            flex: 1;
            text-align: center;
        }

        .option-btn:hover { border-color: #555; color: var(--text); }

        .option-btn.active { color: #0f0f0f; border-color: transparent; }
        .option-btn[data-diff="facil"].active    { background: #4ade80; }
        .option-btn[data-diff="medio"].active    { background: #facc15; }
        .option-btn[data-diff="dificil"].active  { background: #fb923c; }
        .option-btn[data-diff="imposible"].active { background: #f87171; }
        .option-btn[data-time].active { background: var(--orange); }

        .start-btn {
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            padding: 14px 40px;
            border-radius: 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            width: 100%;
        }

        .start-btn:hover { background: var(--accent-dim); }
        .start-btn:active { transform: scale(0.97); }

        /* ---- GAME SCREEN ---- */
        .game-screen {
            width: 100%;
            max-width: 600px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .game-screen.visible { display: flex; }

        /* Timer bar */
        .timer-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .timer-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .timer-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            line-height: 1;
            transition: color 0.3s;
        }

        .timer-value.danger { color: var(--red); animation: shake 0.3s ease; }
        .timer-value.warn { color: var(--orange); }
        .timer-value.ok { color: var(--accent); }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .timer-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: var(--text-muted);
        }

        .timer-score span { color: var(--accent); }

        .timer-bar-bg {
            width: 100%;
            height: 4px;
            background: var(--surface2);
            border-radius: 2px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.1s linear, background 0.3s;
        }

        .timer-bar-fill.warn { background: var(--orange); }
        .timer-bar-fill.danger { background: var(--red); }

        /* Word prompt */
        .word-prompt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .prompt-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
        }

        .base-word {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.2rem;
            letter-spacing: 8px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 32px;
            border-radius: 12px;
        }

        /* Input row */
        .input-row {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            min-height: 66px;
            justify-content: center;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            color: var(--text);
            background: var(--surface);
            flex-shrink: 0;
            transition: border-color 0.1s;
        }

        .cell.active-border { border-color: #555; }

        .cell.pop { animation: pop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes pop {
            0%,100% { transform: scale(1); }
            60% { transform: scale(1.1); }
        }

        @keyframes revealIn {
            0% { transform: scale(0.85); opacity: 0.2; }
            60% { transform: scale(1.06); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.reveal { animation: revealIn 0.35s cubic-bezier(0.34, 1.4, 0.64, 1) forwards; }
        .cell.green  { background: var(--green);  border-color: var(--green);  color: #0f0f0f; }
        .cell.yellow { background: var(--yellow); border-color: var(--yellow); color: #0f0f0f; }
        .cell.gray   { background: var(--gray);   border-color: var(--gray); }

        /* Feedback message */
        .feedback {
            font-size: 0.85rem;
            font-weight: 600;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .feedback.success { color: var(--green); }
        .feedback.warn    { color: var(--yellow); }
        .feedback.error   { color: var(--red); }

        .time-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            padding: 2px 10px;
            border-radius: 10px;
            letter-spacing: 1px;
        }

        .time-badge.plus  { background: #4ade8022; color: var(--green); }
        .time-badge.minus { background: #f8717122; color: var(--red); }

        /* Checking */
        .checking-badge {
            display: none;
            align-items: center;
            justify-content: center;
        }

        .checking-badge.visible { display: flex; }

        .breathing-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 6px;
            color: var(--text-muted);
            animation: breathe 2s ease-in-out infinite;
        }

        @keyframes breathe {
            0%,100% { opacity: 0.3; transform: scale(0.97); letter-spacing: 5px; }
            50%  { opacity: 1; transform: scale(1.04); letter-spacing: 8px; }
        }

        /* Word history */
        .history {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 160px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--surface2);
        }

        .history::-webkit-scrollbar {
            width: 4px;
        }

        .history::-webkit-scrollbar-track {
            background: var(--surface2);
            border-radius: 2px;
        }

        .history::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .history-word {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .history-word.green  { color: var(--green); }
        .history-word.yellow { color: var(--yellow); }

        .history-pts {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--accent);
        }

        /* Keyboard */
        .keyboard {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .key-row { display: flex; justify-content: center; gap: 5px; }

        .key {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            height: 50px;
            min-width: 38px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s, transform 0.08s;
            text-transform: uppercase;
            flex: 1;
            max-width: 50px;
            user-select: none;
        }

        .key:active { transform: scale(0.92); }
        .key.wide { min-width: 60px; max-width: 70px; font-size: 0.8rem; background: #2c2c2c; }
        .key.enter-key, .key.back-key { background: var(--accent); color: #0f0f0f; font-weight: 800; }
        .key.enter-key:hover, .key.back-key:hover { background: var(--accent-dim); }

        /* END SCREEN */
        .end-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            padding-top: 10px;
        }

        .end-screen.visible { display: flex; }

        .end-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: var(--accent);
            text-align: center;
        }

        .end-stats {
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        .end-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 24px;
        }

        .end-stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: var(--accent);
            line-height: 1;
        }

        .end-stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .best-words {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .best-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .best-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .best-item-word {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .best-item-word.green  { color: var(--green); }
        .best-item-word.yellow { color: var(--yellow); }

        .best-item-info {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .best-item-pts {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--accent);
            font-size: 1rem;
        }

        .play-again-btn {
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            width: 100%;
        }

        .play-again-btn:hover { background: var(--accent-dim); }
        .play-again-btn:active { transform: scale(0.97); }

        @media (max-width: 560px) {
            :root { --cell-size: 42px; }
            .logo { font-size: 2rem; }
            .base-word { font-size: 2rem; letter-spacing: 3px; padding: 7px 16px; }
            .key { height: 40px; font-size: 0.75rem; min-width: 0; max-width: none; flex: 1; padding: 0 2px; }
            .key.wide { min-width: 0; max-width: none; flex: 1.6; }
            .keyboard { gap: 5px; }
            .key-row { gap: 4px; }
            .timer-value { font-size: 2rem; }
        }

        @media (max-width: 380px) {
            .key { height: 36px; font-size: 0.68rem; }
            .base-word { font-size: 1.7rem; }
            :root { --cell-size: 36px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left"></div>
    <div class="logo">RIMA<span>DLE</span></div>
    <div class="header-right">
        <button class="mode-switch" id="modeSwitchBtn">
            <span class="dot"></span>
            CLÁSICO
        </button>
    </div>
</header>

<!-- SETUP SCREEN -->
<div class="setup-screen" id="setupScreen">
    <div class="setup-title">MODO CONTRARRELOJ</div>

    <div class="setup-section">
        <div class="setup-label">Dificultad de palabras</div>
        <div class="option-row">
            <button class="option-btn active" data-diff="facil">Fácil</button>
            <button class="option-btn" data-diff="medio">Medio</button>
            <button class="option-btn" data-diff="dificil">Difícil</button>
            <button class="option-btn" data-diff="imposible">Imposible</button>
        </div>
    </div>

    <div class="setup-section">
        <div class="setup-label">Tiempo inicial</div>
        <div class="option-row">
            <button class="option-btn" data-time="20">20s</button>
            <button class="option-btn active" data-time="30">30s</button>
            <button class="option-btn" data-time="60">60s</button>
            <button class="option-btn" data-time="90">90s</button>
        </div>
    </div>

    <div class="setup-section">
        <div class="setup-label">Bonificaciones</div>
        <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; width: 100%;">
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <span style="color: var(--text-muted);">Rima consonante</span>
                <span style="color: var(--green); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;">+10s</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <span style="color: var(--text-muted);">Rima asonante</span>
                <span style="color: var(--yellow); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;">+3s · no resta</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <span style="color: var(--text-muted);">No rima</span>
                <span style="color: var(--red); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;">−5s</span>
            </div>
        </div>
    </div>

    <button class="start-btn" id="startBtn">Empezar</button>
</div>

<!-- GAME SCREEN -->
<div class="game-screen" id="gameScreen">

    <div class="timer-wrap">
        <div class="timer-top">
            <div class="timer-value ok" id="timerDisplay">30s</div>
            <div class="timer-score">Puntos: <span id="scoreDisplay">0</span></div>
        </div>
        <div class="timer-bar-bg">
            <div class="timer-bar-fill" id="timerBar"></div>
        </div>
    </div>

    <div class="word-prompt">
        <div class="prompt-label">rima con</div>
        <div class="base-word" id="baseWordDisplay">—</div>
    </div>

    <div class="input-row" id="inputRow"></div>

    <div class="checking-badge" id="checkingBadge">
        <span class="breathing-text">CONSULTANDO</span>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="history" id="history"></div>

    <div class="keyboard" id="keyboard"></div>

</div>

<!-- END SCREEN -->
<div class="end-screen" id="endScreen">
    <div class="end-title">TIEMPO AGOTADO</div>

    <div class="end-stats">
        <div class="end-stat">
            <div class="end-stat-val" id="endTotal">0</div>
            <div class="end-stat-label">Palabras</div>
        </div>
        <div class="end-stat">
            <div class="end-stat-val" id="endScore">0</div>
            <div class="end-stat-label">Puntos</div>
        </div>
        <div class="end-stat">
            <div class="end-stat-val" id="endBest">0</div>
            <div class="end-stat-label">Mejor pts</div>
        </div>
    </div>

    <div class="best-words" id="bestWords"></div>

    <button class="play-again-btn" id="playAgainBtn">Jugar de nuevo</button>
</div>

<script src="/words.js"></script>
<script>
(function () {

// ── WORD LISTS ────────────────────────────────────────────────

// ── STATE ─────────────────────────────────────────────────────
let currentMode   = 'facil';
let initialTime   = 30;
let timeLeft      = 30;
let timerInterval = null;
let isRunning     = false;
let isChecking    = false;
let currentInput  = '';
let currentWord   = '';
let usedWords     = new Set();
let score         = 0;
let wordsRhymed   = [];  // { word, base, color, pts }
let allUsedBases  = new Set();

// ── DOM ───────────────────────────────────────────────────────
const setupScreen  = document.getElementById('setupScreen');
const gameScreen   = document.getElementById('gameScreen');
const endScreen    = document.getElementById('endScreen');
const timerDisplay = document.getElementById('timerDisplay');
const timerBar     = document.getElementById('timerBar');
const scoreDisplay = document.getElementById('scoreDisplay');
const baseWordEl   = document.getElementById('baseWordDisplay');
const inputRow     = document.getElementById('inputRow');
const feedbackEl   = document.getElementById('feedback');
const historyEl    = document.getElementById('history');
const checkingBadge= document.getElementById('checkingBadge');

// ── SETUP BUTTONS ─────────────────────────────────────────────
document.querySelectorAll('.option-btn[data-diff]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.option-btn[data-diff]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.diff;
    });
});

document.querySelectorAll('.option-btn[data-time]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.option-btn[data-time]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        initialTime = parseInt(btn.dataset.time);
    });
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('playAgainBtn').addEventListener('click', () => {
    endScreen.classList.remove('visible');
    setupScreen.style.display = 'flex';
});

document.getElementById('modeSwitchBtn').addEventListener('click', () => {
    window.location.href = '/';
});

// ── GAME FLOW ─────────────────────────────────────────────────
function startGame() {
    setupScreen.style.display = 'none';
    gameScreen.classList.add('visible');

    timeLeft  = initialTime;
    score     = 0;
    wordsRhymed = [];
    allUsedBases.clear();
    usedWords.clear();
    currentInput = '';

    scoreDisplay.textContent = '0';
    historyEl.innerHTML = '';

    pickNewWord();
    buildKeyboard();
    startTimer();
}

function pickNewWord() {
    const list = WORD_LISTS[currentMode] || WORD_LISTS.facil;
    const available = list.filter(w => !allUsedBases.has(w));
    const pool = available.length > 0 ? available : list;
    currentWord = pool[Math.floor(Math.random() * pool.length)];
    allUsedBases.add(currentWord);
    usedWords.clear();
    currentInput = '';
    baseWordEl.textContent = currentWord;
    updateInputRow();
}

// ── TIMER ─────────────────────────────────────────────────────
function startTimer() {
    isRunning = true;
    updateTimerUI();
    timerInterval = setInterval(() => {
        timeLeft = Math.max(0, timeLeft - 0.1);
        updateTimerUI();
        if (timeLeft <= 0) endGame();
    }, 100);
}

function addTime(secs) {
    timeLeft = Math.min(initialTime, Math.max(0, timeLeft + secs));
    updateTimerUI();
}

function updateTimerUI() {
    const secs = Math.ceil(timeLeft);
    timerDisplay.textContent = secs + 's';
    const pct = (timeLeft / initialTime) * 100;
    timerBar.style.width = pct + '%';

    timerDisplay.classList.remove('ok','warn','danger');
    timerBar.classList.remove('warn','danger');

    if (timeLeft > initialTime * 0.5) {
        timerDisplay.classList.add('ok');
    } else if (timeLeft > initialTime * 0.25) {
        timerDisplay.classList.add('warn');
        timerBar.classList.add('warn');
    } else {
        timerDisplay.classList.add('danger');
        timerBar.classList.add('danger');
    }
}

// ── INPUT ─────────────────────────────────────────────────────
function handleKey(key) {
    if (!isRunning || isChecking) return;
    key = key.toUpperCase();

    if (key === '⌫' || key === 'BACKSPACE') {
        if (currentInput.length > 0) {
            currentInput = currentInput.slice(0,-1);
            updateInputRow();
            clearFeedback();
        }
        return;
    }
    if (key === 'ENTER') { submitGuess(); return; }
    if (/^[A-ZÑ]$/.test(key) && currentInput.length < 20) {
        currentInput += key;
        updateInputRow();
        const cells = inputRow.querySelectorAll('.cell');
        const last = cells[cells.length - 1];
        if (last) {
            last.classList.remove('pop');
            requestAnimationFrame(() => requestAnimationFrame(() => last.classList.add('pop')));
        }
    }
}

window.addEventListener('keydown', e => {
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    const map = {'á':'a','é':'e','í':'i','ó':'o','ú':'u','ü':'u','Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','Ü':'U'};
    if (e.key === 'Enter') { e.preventDefault(); handleKey('ENTER'); }
    else if (e.key === 'Backspace') { e.preventDefault(); handleKey('⌫'); }
    else if (/^[a-zA-ZñÑáéíóúÁÉÍÓÚüÜ]$/.test(e.key)) {
        e.preventDefault();
        handleKey(map[e.key] || e.key);
    }
});

function updateInputRow() {
    const len = Math.max(currentInput.length, 1);
    inputRow.innerHTML = '';
    for (let i = 0; i < len; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell' + (i === currentInput.length - 1 && currentInput.length > 0 ? ' active-border' : '');
        cell.textContent = currentInput[i] || '';
        inputRow.appendChild(cell);
    }
}

// ── SUBMIT ────────────────────────────────────────────────────
async function submitGuess() {
    if (!isRunning || isChecking) return;
    const guess = currentInput.trim();
    if (guess.length < 2) { showFeedback('Escribe al menos 2 letras', 'error'); return; }
    if (guess === currentWord) { showFeedback('Esa es la palabra base', 'error'); return; }
    if (usedWords.has(guess)) { showFeedback('Ya usaste esa palabra', 'error'); return; }

    isChecking = true;
    checkingBadge.classList.add('visible');

    let result;
    try {
        const resp = await Promise.race([
            fetch('/api/rhyme', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ guess, base: currentWord })
            }).then(r => r.json()),
            new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 8000))
        ]);
        result = resp;
    } catch {
        // fallback local
        result = {
            es_palabra_real: true,
            tipo_rima: getRhymeStem(guess) === getRhymeStem(currentWord) ? 'consonante' : 'ninguna',
            complejidad: Math.min(10, Math.max(1, Math.floor(guess.length / 1.5))),
            explicacion: 'Validación local'
        };
    } finally {
        checkingBadge.classList.remove('visible');
        isChecking = false;
    }

    if (!result.es_palabra_real) {
        showFeedback('No es una palabra válida', 'error');
        addTime(-5);
        flashTimer();
        return;
    }

    usedWords.add(guess);
    const color = result.tipo_rima === 'consonante' ? 'green' : result.tipo_rima === 'asonante' ? 'yellow' : 'gray';
    const pts = calcPoints(guess, result.tipo_rima, result.complejidad || 5);

    // Reveal cells
    await revealCells(guess, color);

    if (color === 'green') {
        addTime(10);
        score += pts;
        scoreDisplay.textContent = score;
        showFeedback('+10s · +' + pts + ' pts — ' + (result.explicacion || ''), 'success');
        wordsRhymed.push({ word: guess, base: currentWord, color, pts });
        addHistory(guess, currentWord, color, pts);
        currentInput = '';
        setTimeout(pickNewWord, 600);
    } else if (color === 'yellow') {
        addTime(3);
        score += pts;
        scoreDisplay.textContent = score;
        showFeedback('+3s · +' + pts + ' pts — ' + (result.explicacion || ''), 'warn');
        wordsRhymed.push({ word: guess, base: currentWord, color, pts });
        addHistory(guess, currentWord, color, pts);
        currentInput = '';
        updateInputRow();
    } else {
        addTime(-5);
        flashTimer();
        showFeedback('−5s — ' + (result.explicacion || 'No rima'), 'error');
        currentInput = '';
        updateInputRow();
    }
}

function flashTimer() {
    timerDisplay.classList.add('danger');
    timerBar.classList.add('danger');
}

function calcPoints(word, rhymeType, complexity) {
    if (rhymeType === 'ninguna') return 0;
    let pts = Math.round(Math.pow(word.length, 2.2) * 0.5);
    if (rhymeType === 'consonante') pts += 20;
    else pts += 10;
    pts += complexity * 5;
    const mult = { facil:1, medio:1.5, dificil:2.5, imposible:4 }[currentMode] || 1;
    return Math.round(pts * mult);
}

async function revealCells(word, colorClass) {
    const cells = inputRow.querySelectorAll('.cell');
    return new Promise(resolve => {
        if (cells.length === 0) { resolve(); return; }
        cells.forEach((cell, i) => {
            setTimeout(() => {
                cell.classList.add(colorClass, 'reveal');
                cell.addEventListener('animationend', () => cell.classList.remove('reveal'), { once: true });
                if (i === cells.length - 1) setTimeout(resolve, 380);
            }, i * 80);
        });
    });
}

function addHistory(word, base, color, pts) {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = '<span class="history-word ' + color + '">' + word + '</span>' +
        '<span style="color:var(--text-muted);font-size:0.75rem">rima con ' + base + '</span>' +
        '<span class="history-pts">+' + pts + '</span>';
    historyEl.insertBefore(item, historyEl.firstChild);
}

function showFeedback(msg, type) {
    feedbackEl.textContent = msg;
    feedbackEl.className = 'feedback ' + type;
    clearTimeout(feedbackEl._t);
    feedbackEl._t = setTimeout(() => { feedbackEl.textContent = ''; feedbackEl.className = 'feedback'; }, 4000);
}

function clearFeedback() {
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
}

// ── END GAME ──────────────────────────────────────────────────
function endGame() {
    clearInterval(timerInterval);
    isRunning = false;
    timeLeft = 0;
    updateTimerUI();

    setTimeout(() => {
        gameScreen.classList.remove('visible');
        showEndScreen();
    }, 400);
}

function showEndScreen() {
    endScreen.classList.add('visible');

    document.getElementById('endTotal').textContent = wordsRhymed.length;
    document.getElementById('endScore').textContent = score;
    const best = wordsRhymed.reduce((a,b) => b.pts > a ? b.pts : a, 0);
    document.getElementById('endBest').textContent = best;

    const sorted = [...wordsRhymed].sort((a,b) => b.pts - a.pts).slice(0, 5);
    const bestWordsEl = document.getElementById('bestWords');
    if (sorted.length === 0) {
        bestWordsEl.innerHTML = '<div class="best-label">Sin rimas conseguidas</div>';
        return;
    }
    bestWordsEl.innerHTML = '<div class="best-label">Mejores palabras</div>' +
        sorted.map(w =>
            '<div class="best-item">' +
            '<span class="best-item-word ' + w.color + '">' + w.word + '</span>' +
            '<span class="best-item-info">rima con ' + w.base + '</span>' +
            '<span class="best-item-pts">+' + w.pts + '</span>' +
            '</div>'
        ).join('');
}

// ── KEYBOARD ─────────────────────────────────────────────────
function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    const rows = [
        ['Q','W','E','R','T','Y','U','I','O','P'],
        ['A','S','D','F','G','H','J','K','L','Ñ'],
        ['ENTER','Z','X','C','V','B','N','M','⌫']
    ];
    rows.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'key-row';
        row.forEach(k => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.textContent = k;
            btn.dataset.key = k;
            if (k === 'ENTER' || k === '⌫') btn.classList.add('wide');
            if (k === 'ENTER') btn.classList.add('enter-key');
            if (k === '⌫') btn.classList.add('back-key');
            btn.addEventListener('click', () => handleKey(k));
            rowEl.appendChild(btn);
        });
        kb.appendChild(rowEl);
    });
}

// ── LOCAL RHYME FALLBACK ──────────────────────────────────────
function normalize(w) {
    return w.toUpperCase()
        .replace(/Á/g,'A').replace(/É/g,'E').replace(/Í/g,'I')
        .replace(/Ó/g,'O').replace(/Ú/g,'U').replace(/Ü/g,'U');
}

function getRhymeStem(word) {
    const w = normalize(word);
    const vowels = 'AEIOU';
    let count = 0;
    for (let i = w.length-1; i >= 0; i--) {
        if (vowels.includes(w[i])) {
            count++;
            if (count === 2) return w.slice(i);
        }
    }
    return w;
}
