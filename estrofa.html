<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIMADLE — Estrofa</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
            --border: #2e2e2e; --accent: #e8ff47; --green: #4ade80;
            --yellow: #facc15; --red: #f87171; --purple: #a78bfa;
            --purple-dim: #9170e8; --text: #f5f5f5; --text-muted: #71717a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 16px 60px; }

        header { width: 100%; max-width: 720px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 20px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 4px; color: var(--accent); text-align: center; line-height: 1; }
        .logo span { color: var(--text); }
        .header-left { display: flex; align-items: center; }
        .header-right { display: flex; justify-content: flex-end; }
        .mode-switch { font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem; letter-spacing: 2px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
        .mode-switch:hover { border-color: var(--purple); color: var(--purple); }

        /* GAME */
        .game-screen { width: 100%; max-width: 620px; display: flex; flex-direction: column; gap: 24px; }

        .prompt-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .prompt-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); }
        .initial-verse {
            font-family: 'Lora', serif;
            font-size: 1.4rem;
            font-style: italic;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--purple);
            border-radius: 0 12px 12px 0;
            padding: 16px 24px;
            width: 100%;
            line-height: 1.6;
        }

        .write-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); }

        .notebook {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px;
            position: relative;
            overflow: hidden;
        }

        .notebook::before {
            content: '"';
            position: absolute;
            top: 10px; left: 16px;
            font-family: 'Lora', serif;
            font-size: 5rem;
            color: var(--purple);
            opacity: 0.1;
            line-height: 1;
            user-select: none;
        }

        .notebook-textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            color: var(--text);
            line-height: 2;
            resize: none;
            min-height: 200px;
            caret-color: var(--purple);
        }

        .notebook-textarea::placeholder { color: var(--text-muted); font-style: italic; }

        .notebook-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .line-count { font-size: 0.75rem; color: var(--text-muted); }
        .line-count span { color: var(--purple); font-family: 'Bebas Neue', sans-serif; font-size: 1rem; }

        .send-btn {
            background: var(--purple);
            color: #0f0f0f;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .send-btn:hover { background: var(--purple-dim); }
        .send-btn:active { transform: scale(0.96); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .new-poem-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .new-poem-btn:hover { border-color: #555; color: var(--text); }

        /* ANALYSIS */
        .analysis-screen { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 620px; }
        .analysis-screen.visible { display: flex; }
        .analyzing-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 4px; color: var(--purple); margin-top: 20px; }
        .breath-text { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 6px; color: var(--text-muted); animation: breathe 2s ease-in-out infinite; }
        @keyframes breathe { 0%,100% { opacity: 0.3; letter-spacing: 4px; } 50% { opacity: 1; letter-spacing: 8px; } }
        .analyzing-poem { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px 28px; opacity: 0.4; font-family: 'Lora', serif; font-size: 1rem; line-height: 2; color: var(--text-muted); white-space: pre-wrap; }

        /* END */
        .end-screen { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 620px; }
        .end-screen.visible { display: flex; }
        .end-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 4px; color: var(--purple); text-align: center; }

        .result-header { width: 100%; display: flex; gap: 12px; flex-wrap: wrap; }
        .score-card { flex: 1; min-width: 80px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .score-val { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; color: var(--accent); line-height: 1; }
        .score-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }
        .scheme-card { flex: 2; min-width: 160px; background: var(--surface); border: 1px solid var(--purple); border-radius: 12px; padding: 14px 18px; display: flex; flex-direction: column; gap: 6px; }
        .scheme-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }
        .scheme-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--purple); letter-spacing: 4px; line-height: 1; }
        .scheme-desc { font-size: 0.8rem; color: var(--text-muted); }

        .ai-analysis { width: 100%; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--purple); border-radius: 0 12px 12px 0; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
        .analysis-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); }
        .analysis-comment { font-family: 'Lora', serif; font-size: 1rem; color: var(--text); line-height: 1.7; font-style: italic; }
        .analysis-scores { display: flex; gap: 8px; flex-wrap: wrap; }
        .ascore { display: flex; flex-direction: column; align-items: center; gap: 3px; background: var(--surface2); border-radius: 10px; padding: 8px 14px; flex: 1; min-width: 70px; }
        .ascore-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; }
        .ascore-val.high { color: var(--green); }
        .ascore-val.mid  { color: var(--yellow); }
        .ascore-val.low  { color: var(--red); }
        .ascore-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); text-align: center; }

        .final-poem-wrap { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; position: relative; }
        .final-poem-deco { position: absolute; top: 12px; left: 16px; font-family: 'Lora', serif; font-size: 4rem; color: var(--purple); opacity: 0.12; line-height: 1; user-select: none; }
        .final-poem-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 16px; }
        .final-verse { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 2; display: flex; align-items: center; gap: 8px; }
        .final-verse.init-verse { color: var(--text-muted); font-style: italic; }
        .final-verse.user-verse { color: var(--text); }
        .verse-letter { display: inline-flex; width: 18px; height: 18px; border-radius: 50%; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; flex-shrink: 0; }

        .bottom-actions { display: flex; gap: 10px; width: 100%; }
        .play-again-btn { flex: 1; background: var(--purple); color: #0f0f0f; border: none; padding: 13px; border-radius: 40px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; cursor: pointer; transition: background 0.15s, transform 0.1s; }
        .play-again-btn:hover { background: var(--purple-dim); }
        .play-again-btn:active { transform: scale(0.97); }

        @media (max-width: 560px) {
            .logo { font-size: 2rem; }
            .initial-verse { font-size: 1.1rem; }
            .notebook-textarea { font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left"></div>
    <div class="logo" style="color:var(--purple)">RIMA<span style="color:var(--text)">DLE</span></div>
    <div class="header-right">
        <button class="mode-switch" id="modeSwitchBtn">CLASICO</button>
    </div>
</header>

<!-- GAME -->
<div class="game-screen" id="gameScreen">

    <div class="prompt-wrap">
        <div class="prompt-label">continua este verso</div>
        <div class="initial-verse" id="initialVerseEl">Cargando verso...</div>
    </div>

    <div class="write-label">Tu estrofa</div>

    <div class="notebook">
        <textarea
            class="notebook-textarea"
            id="strophaInput"
            placeholder="Escribe aqui tu estrofa completa...
Puedes escribir tantas lineas como quieras.
Cuando termines pulsa Enviar."
        ></textarea>
        <div class="notebook-footer">
            <div class="line-count">Lineas: <span id="lineCount">0</span></div>
            <div style="display:flex;gap:10px">
                <button class="new-poem-btn" id="newVerseBtn">Otro verso</button>
                <button class="send-btn" id="sendBtn">Enviar estrofa</button>
            </div>
        </div>
    </div>

</div>

<!-- ANALYSIS -->
<div class="analysis-screen" id="analysisScreen">
    <div class="analyzing-title">ANALIZANDO TU ESTROFA</div>
    <span class="breath-text">LA IA ESTA LEYENDO TU POEMA</span>
    <div class="analyzing-poem" id="analyzingPoem"></div>
</div>

<!-- END -->
<div class="end-screen" id="endScreen">
    <div class="end-title">ANALISIS COMPLETO</div>

    <div class="result-header">
        <div class="score-card">
            <div class="score-val" id="endScore">0</div>
            <div class="score-label">Puntos</div>
        </div>
        <div class="score-card">
            <div class="score-val" id="endVerses">0</div>
            <div class="score-label">Versos</div>
        </div>
        <div class="scheme-card">
            <div class="scheme-label">Esquema detectado</div>
            <div class="scheme-name" id="schemeName">-</div>
            <div class="scheme-desc" id="schemeDesc">-</div>
        </div>
    </div>

    <div class="ai-analysis">
        <div class="analysis-title">Valoracion de la IA</div>
        <div class="analysis-comment" id="analysisComment">-</div>
        <div class="analysis-scores">
            <div class="ascore"><div class="ascore-val" id="scoreRima">-</div><div class="ascore-label">Rima</div></div>
            <div class="ascore"><div class="ascore-val" id="scoreSentido">-</div><div class="ascore-label">Sentido</div></div>
            <div class="ascore"><div class="ascore-val" id="scoreCreatividad">-</div><div class="ascore-label">Creatividad</div></div>
            <div class="ascore"><div class="ascore-val" id="scoreFluidez">-</div><div class="ascore-label">Fluidez</div></div>
        </div>
    </div>

    <div class="final-poem-wrap">
        <div class="final-poem-deco">"</div>
        <div class="final-poem-label">Tu poema completo</div>
        <div id="finalPoemLines"></div>
    </div>

    <div class="bottom-actions">
        <button class="play-again-btn" id="playAgainBtn">Componer otro poema</button>
    </div>
</div>

<script>
(function () {

const INITIAL_VERSES = [
    "Que bonitos tus ojos azules",
    "En el cielo brilla una estrella",
    "La luna se asoma entre nubes",
    "El viento susurra entre arboles",
    "Camino perdido entre sombras",
    "El mar rompe contra las rocas",
    "Tu voz es como el agua clara",
    "Las flores se abren al alba",
    "El tiempo se escapa entre dedos",
    "Bailas descalza sobre la arena",
    "El rio canta su cancion",
    "La noche cayo sobre el valle",
    "Corres sin miedo por el campo",
    "El fuego ilumina la noche",
    "Tus manos son suaves y calidas",
    "Bajo la lluvia te vi partir",
    "El silencio pesa como el plomo",
    "Tus palabras saben a miel y sal",
    "La tarde se tino de naranja",
    "Entre tus brazos encontre la paz",
];

const SCHEME_COLORS = ['#a78bfa','#4ade80','#facc15','#fb923c','#f87171','#60a5fa'];

let currentVerse = '';
let isAnalyzing  = false;

const gameScreen     = document.getElementById('gameScreen');
const analysisScreen = document.getElementById('analysisScreen');
const endScreen      = document.getElementById('endScreen');
const initialVerseEl = document.getElementById('initialVerseEl');
const strophaInput   = document.getElementById('strophaInput');
const lineCountEl    = document.getElementById('lineCount');
const sendBtn        = document.getElementById('sendBtn');
const newVerseBtn    = document.getElementById('newVerseBtn');

function pickVerse() {
    currentVerse = INITIAL_VERSES[Math.floor(Math.random() * INITIAL_VERSES.length)];
    initialVerseEl.textContent = currentVerse;
    strophaInput.value = '';
    lineCountEl.textContent = '0';
    strophaInput.focus();
}

strophaInput.addEventListener('input', () => {
    const lines = strophaInput.value.split('\n').filter(l => l.trim().length > 0);
    lineCountEl.textContent = lines.length;
});

newVerseBtn.addEventListener('click', () => {
    if (isAnalyzing) return;
    pickVerse();
});

sendBtn.addEventListener('click', () => {
    if (isAnalyzing) return;
    const text = strophaInput.value.trim();
    if (text.length < 5) return;
    sendStropha(text);
});

document.getElementById('modeSwitchBtn').addEventListener('click', () => {
    window.location.href = '/home';
});

document.getElementById('playAgainBtn').addEventListener('click', () => {
    endScreen.classList.remove('visible');
    gameScreen.style.display = 'flex';
    pickVerse();
});

async function sendStropha(text) {
    isAnalyzing = true;
    sendBtn.disabled = true;

    // Show analysis screen
    gameScreen.style.display = 'none';
    analysisScreen.classList.add('visible');

    // Show poem dimmed
    const ap = document.getElementById('analyzingPoem');
    ap.textContent = currentVerse + '\n\n' + text;

    const fullPoem = currentVerse + '\n' + text;
    let result;

    try {
        const resp = await Promise.race([
            fetch('/api/verse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ poem: fullPoem })
            }).then(r => r.json()),
            new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 15000))
        ]);
        result = (resp && resp.esquema) ? resp : localAnalysis(fullPoem);
    } catch {
        result = localAnalysis(fullPoem);
    }

    analysisScreen.classList.remove('visible');
    showEndScreen(result, fullPoem);
    isAnalyzing = false;
    sendBtn.disabled = false;
}

function localAnalysis(poem) {
    const lines = poem.split('\n').filter(l => l.trim().length > 0);

    function getLastWord(s) {
        return s.trim().split(/\s+/).pop().replace(/[.,;:!?]/g,'').toUpperCase();
    }
    function normalize(w) {
        return w.replace(/A/g,'A').replace(/E/g,'E').replace(/I/g,'I').replace(/O/g,'O').replace(/U/g,'U');
    }
    function getStem(w) {
        w = normalize(w); let c = 0;
        for (let i = w.length-1; i >= 0; i--) {
            if ('AEIOU'.includes(w[i])) { c++; if (c===2) return w.slice(i); }
        }
        return w;
    }

    const stems = lines.map(l => getStem(getLastWord(l)));
    const map = {}; let next = 65;
    const letters = stems.map(s => { if (!map[s]) map[s] = String.fromCharCode(next++); return map[s]; });
    const scheme = letters.join('');
    const n = lines.length - 1;
    const uniqueRhymes = new Set(Object.values(map)).size;
    const rimaScore = Math.min(10, Math.round((lines.length / Math.max(uniqueRhymes, 1)) * 3 + 2));
    const pts = n * 60 + rimaScore * 25;
    const schemeMap = {'AABB':'Pareados','ABAB':'Rima cruzada','ABBA':'Rima abrazada','AAAA':'Monorrima','AABBCC':'Sextilla','ABABAB':'Sexteto'};

    return {
        esquema: scheme,
        descripcion: schemeMap[scheme] || 'Esquema libre',
        letras: letters,
        comentario: n === 0 ? 'No escribiste ninguna estrofa.' : 'Analisis local — conecta la IA para una valoracion completa.',
        rima: rimaScore, sentido: 5, creatividad: 5, fluidez: 5,
        puntos: pts,
        lines
    };
}

function showEndScreen(result, poem) {
    endScreen.classList.add('visible');

    const lines = result.lines || poem.split('\n').filter(l => l.trim().length > 0);
    const userLines = lines.slice(1).length;

    document.getElementById('endScore').textContent = result.puntos || 0;
    document.getElementById('endVerses').textContent = userLines;
    document.getElementById('schemeName').textContent = result.esquema || '-';
    document.getElementById('schemeDesc').textContent = result.descripcion || '-';
    document.getElementById('analysisComment').textContent = result.comentario || '-';

    function scoreClass(n) { return n >= 7 ? 'high' : n >= 4 ? 'mid' : 'low'; }
    function setScore(id, val) {
        const el = document.getElementById(id);
        el.textContent = val + '/10';
        el.className = 'ascore-val ' + scoreClass(val);
    }
    setScore('scoreRima', result.rima || 0);
    setScore('scoreSentido', result.sentido || 0);
    setScore('scoreCreatividad', result.creatividad || 0);
    setScore('scoreFluidez', result.fluidez || 0);

    const fp = document.getElementById('finalPoemLines');
    fp.innerHTML = '';
    const letters = result.letras || lines.map((_,i) => String.fromCharCode(65 + (i % 26)));

    lines.forEach((line, i) => {
        const div = document.createElement('div');
        div.className = 'final-verse ' + (i === 0 ? 'init-verse' : 'user-verse');
        if (letters[i]) {
            const badge = document.createElement('span');
            badge.className = 'verse-letter';
            const ci = (letters[i].charCodeAt(0) - 65) % SCHEME_COLORS.length;
            badge.style.background = SCHEME_COLORS[ci] + '33';
            badge.style.color = SCHEME_COLORS[ci];
            badge.textContent = letters[i];
            div.appendChild(badge);
        }
        div.appendChild(document.createTextNode(line));
        fp.appendChild(div);
    });
}

// Init
pickVerse();

})();
</script>
</body>
</html>
